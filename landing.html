<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.20.12/babel.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        // Reusable Card Component
        const Card = ({ children }) => (
            <div className="p-4 bg-white shadow rounded">{children}</div>
        );

        // Reusable Button Component
        const Button = ({ children, onClick }) => (
            <button
                onClick={onClick}
                className="mt-4 bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600 w-full"
            >
                {children}
            </button>
        );

        // Main App Component
        const App = () => {
            const [email, setEmail] = useState('');
            const affiliateTools = [
                { name: "ChatGPT Plus", description: "AI writing tool", commission: "$20/referral", rating: 4.7 },
                { name: "Midjourney", description: "AI image generation", commission: "$30/signup", rating: 4.5 },
                { name: "Jasper AI", description: "Content creation AI", commission: "40% recurring", rating: 4.6 },
            ];

            const handleEmailSubmit = (e) => {
                e.preventDefault();
                alert(`Thanks for subscribing with ${email}!`);
                setEmail('');
            };

            return (
                <div className="min-h-screen bg-gray-50 p-6">
                    <h1 className="text-3xl font-bold text-blue-600 text-center mb-4">Affiliate Tools</h1>
                    <div className="grid md:grid-cols-3 gap-6 mb-12">
                        {affiliateTools.map((tool, index) => (
                            <Card key={index}>
                                <h2 className="font-semibold flex justify-between items-center">
                                    {tool.name}
                                    <span className="flex items-center text-yellow-500">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                            <path d="M9.049 2.927a1 1 0 011.902 0l1.034 2.916a1 1 0 00.95.69h3.066a1 1 0 01.588 1.81l-2.482 1.81a1 1 0 00-.364 1.118l1.034 2.916a1 1 0 01-1.54 1.18l-2.482-1.81a1 1 0 00-1.176 0l-2.482 1.81a1 1 0 01-1.54-1.18l1.034-2.916a1 1 0 00-.364-1.118L2.49 8.343a1 1 0 01.588-1.81h3.066a1 1 0 00.95-.69l1.034-2.916z" />
                                        </svg>
                                        {tool.rating}
                                    </span>
                                </h2>
                                <p>{tool.description}</p>
                                <p className="text-green-600 font-semibold">{tool.commission}</p>
                                <Button onClick={() => alert(`Getting affiliate link for ${tool.name}`)}>
                                    Get Affiliate Link
                                </Button>
                            </Card>
                        ))}
                    </div>
                    <form onSubmit={handleEmailSubmit} className="bg-white p-6 rounded-lg shadow-md max-w-md mx-auto">
                        <h2 className="text-xl font-semibold mb-4">Subscribe</h2>
                        <input
                            type="email"
                            value={email}
                            onChange={(e) => setEmail(e.target.value)}
                            placeholder="Enter your email"
                            className="w-full p-3 border rounded mb-4"
                            required
                        />
                        <Button>Subscribe</Button>
                    </form>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
